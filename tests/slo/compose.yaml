# Full SLO/chaos stack (multi-node YDB cluster + chaos monkey + telemetry),
# pulled straight from ydb-slo-action so a local run is identical to CI.
# The workload image itself is built by compose.override.yaml.
#
# See SLO.md for the one-command runs. For a lightweight single-node stack
# (quick local dev, no chaos) use compose.dev.yaml instead.
include:
  - path: https://github.com/ydb-platform/ydb-slo-action.git#v2:deploy/compose.yml
