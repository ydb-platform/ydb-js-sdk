name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    concurrency:
      group: lint-${{ github.event_name }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    concurrency:
      group: build-${{ github.event_name }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: npm run build
      - run: npm run attw
      - run: npm run check:surface --workspace=@ydbjs/drizzle-adapter

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    concurrency:
      group: ${{ github.event_name }}-${{ github.ref }}-${{ matrix.node-version }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24, 26]

    services:
      ydb:
        image: ydbplatform/local-ydb:25.2
        ports:
          - 2135:2135
          - 2136:2136
          - 8765:8765
        volumes:
          - /tmp/ydb_certs:/ydb_certs
        env:
          YDB_ENABLE_COLUMN_TABLES: true
          YDB_USE_IN_MEMORY_PDISKS: true
        options: '-h localhost'

    env:
      YDB_STATIC_CREDENTIALS_USER: root
      YDB_STATIC_CREDENTIALS_PASSWORD: 1234
      YDB_STATIC_CREDENTIALS_ENDPOINT: grpc://localhost:2136
      YDB_CONNECTION_STRING: grpc://localhost:2136/local
      YDB_CONNECTION_STRING_SECURE: grpcs://localhost:2135/local
      YDB_SSL_ROOT_CERTIFICATES_FILE: /tmp/ydb_certs/ca.pem

    steps:
      # Checkout the repository
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node-version }}

      - name: Test
        if: matrix.node-version != 24
        run: npm run test

      - name: Test with coverage
        if: matrix.node-version == 24
        run: npm run coverage -- --reporter=default --reporter=html --reporter=github-actions

      - name: Upload coverage to Codecov
        if: matrix.node-version == 24
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
          fail_ci_if_error: false

      - name: Publish coverage report to Object Storage
        if: matrix.node-version == 24
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ru-central1
        run: |
          bucket=ydb-appteam-sdk-reports
          endpoint=https://storage.yandexcloud.net

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            path="ydb-js-sdk/pr-${{ github.event.pull_request.number }}/"
          else
            path="ydb-js-sdk/"
          fi

          aws --endpoint-url "$endpoint" s3 sync ./coverage "s3://$bucket/${path}coverage/" --delete
          aws --endpoint-url "$endpoint" s3 sync ./html "s3://$bucket/${path}tests/" --delete

          {
            echo "### :bar_chart: [Coverage report](https://$bucket.website.yandexcloud.net/${path}coverage/)"
            echo "### :test_tube: [Test report](https://$bucket.website.yandexcloud.net/${path}tests/)"
          } >> "$GITHUB_STEP_SUMMARY"
